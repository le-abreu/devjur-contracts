openapi: 3.1.0
info:
  title: DEVJUR Platform API
  version: 0.1.0
  description: Foundation API for tenant context, authenticated user context and tenant database probe.
servers:
  - url: http://demo.api.localhost:8080
    description: Local demo tenant API
security:
  - bearerAuth: []
paths:
  /api/platform/tenants:
    post:
      operationId: provisionTenant
      summary: Provisions a tenant realm, hosts and baseline administrative access.
      tags: [Platform Tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisionTenantRequest"
      responses:
        "201":
          description: Tenant provisioning request accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionTenantResponse"
        "400":
          description: Provisioning request is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Tenant key, host or realm already exists.
  /api/platform/tenants/{tenantKey}:
    get:
      operationId: getTenantProvisioning
      summary: Returns tenant provisioning status and resolved platform metadata.
      tags: [Platform Tenants]
      parameters:
        - name: tenantKey
          in: path
          required: true
          schema:
            type: string
            pattern: ^[a-z0-9-]{3,40}$
      responses:
        "200":
          description: Tenant provisioning status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionTenantResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Tenant provisioning record was not found.
  /api/platform/permissions/navigation:
    get:
      operationId: getNavigationPermissions
      summary: Returns navigation entries allowed for the authenticated user.
      tags: [Platform Permissions]
      responses:
        "200":
          description: Navigation permission projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NavigationPermissionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/platform/features/{flagKey}/evaluate:
    get:
      operationId: evaluateFeatureFlag
      summary: Evaluates a platform feature flag for the current tenant and user context.
      tags: [Platform Features]
      parameters:
        - name: flagKey
          in: path
          required: true
          schema:
            type: string
            minLength: 1
          example: platform.storage.enabled
      responses:
        "200":
          description: Feature flag evaluation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureFlagEvaluationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/platform/files:
    post:
      operationId: uploadPlatformFile
      summary: Uploads a tenant file through the API so metadata and audit can be recorded.
      tags: [Platform Files]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: File uploaded and metadata recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResponse"
        "400":
          description: Upload request is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          description: Storage service is disabled or unavailable.
  /api/platform/files/{fileId}:
    get:
      operationId: getPlatformFileMetadata
      summary: Returns tenant file metadata.
      tags: [Platform Files]
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: File metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileMetadataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: File metadata was not found.
  /api/platform/files/{fileId}/download:
    get:
      operationId: downloadPlatformFile
      summary: Downloads a tenant file through the API so access can be audited.
      tags: [Platform Files]
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: File bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: File was not found.
        "503":
          description: Storage service is disabled or unavailable.
  /api/platform/audit:
    get:
      operationId: searchAuditEntries
      summary: Searches tenant audit entries.
      tags: [Platform Audit]
      parameters:
        - name: action
          in: query
          required: false
          schema:
            type: string
          example: FILE_UPLOADED
        - name: resourceType
          in: query
          required: false
          schema:
            type: string
          example: platform_file
        - name: resourceId
          in: query
          required: false
          schema:
            type: string
          example: 9dc62667-7df6-48e4-a877-a1784e81c57f
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Audit entries ordered by occurrence time descending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEntryPageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/platform/mail/test:
    post:
      operationId: sendPlatformTestEmail
      summary: Sends a controlled test email through the platform mail service.
      tags: [Platform Mail]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MailTestRequest"
      responses:
        "202":
          description: Test email request accepted by the platform mail service.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailTestResponse"
        "400":
          description: Mail test request is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/foundation/tenant/current:
    get:
      operationId: getCurrentTenant
      summary: Returns the tenant resolved from the request host.
      tags: [Foundation]
      responses:
        "200":
          description: Current tenant context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentTenantResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/foundation/me:
    get:
      operationId: getCurrentUser
      summary: Returns the authenticated user context.
      tags: [Foundation]
      responses:
        "200":
          description: Current authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/foundation/probe:
    post:
      operationId: createFoundationProbe
      summary: Writes a probe record into the current tenant database.
      tags: [Foundation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProbeRequest"
      responses:
        "201":
          description: Probe created in the tenant database.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    FileId:
      name: fileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Authentication is missing or invalid.
    Forbidden:
      description: Tenant, issuer, realm or permission validation failed.
  schemas:
    ProvisionTenantRequest:
      type: object
      required: [tenantKey, displayName, apiHost, webHost, realm]
      properties:
        tenantKey:
          type: string
          pattern: ^[a-z0-9-]{3,40}$
          example: acme
        displayName:
          type: string
          minLength: 3
          maxLength: 120
          example: ACME Juridico
        apiHost:
          type: string
          example: acme.api.localhost
        webHost:
          type: string
          example: acme.localhost
        realm:
          type: string
          pattern: ^[a-z0-9-]{3,80}$
          example: devjur-acme
        adminUsername:
          type: string
          default: admin.acme
          example: admin.acme
        adminEmail:
          type: string
          format: email
          example: admin.acme@devjur.local
    ProvisionTenantResponse:
      type: object
      required: [tenantKey, displayName, apiHost, webHost, realm, status, vaultPath, createdAt]
      properties:
        tenantKey:
          type: string
          pattern: ^[a-z0-9-]{3,40}$
          example: acme
        displayName:
          type: string
          example: ACME Juridico
        apiHost:
          type: string
          example: acme.api.localhost
        webHost:
          type: string
          example: acme.localhost
        realm:
          type: string
          pattern: ^[a-z0-9-]{3,80}$
          example: devjur-acme
        status:
          type: string
          enum: [PROVISIONING, ACTIVE, FAILED]
          example: ACTIVE
        vaultPath:
          type: string
          example: secret/data/devjur/tenants/acme/database
        createdAt:
          type: string
          format: date-time
    NavigationPermissionResponse:
      type: object
      required: [tenantKey, entries]
      properties:
        tenantKey:
          type: string
          example: demo
        entries:
          type: array
          items:
            $ref: "#/components/schemas/NavigationEntry"
    NavigationEntry:
      type: object
      required: [id, label, route, requiredRole]
      properties:
        id:
          type: string
          example: dashboard
        label:
          type: string
          example: Dashboard
        route:
          type: string
          example: /
        requiredRole:
          type: string
          example: DEVJUR_ADMIN
    CurrentTenantResponse:
      type: object
      required: [tenantKey, host, realm, issuer]
      properties:
        tenantKey:
          type: string
          example: demo
        host:
          type: string
          example: demo.api.localhost
        realm:
          type: string
          example: devjur-demo
        issuer:
          type: string
          example: http://localhost:8081/realms/devjur-demo
    CurrentUserResponse:
      type: object
      required: [subject, preferredUsername, tenantKey, issuer, roles]
      properties:
        subject:
          type: string
          example: 9dc62667-7df6-48e4-a877-a1784e81c57f
        preferredUsername:
          type: string
          example: admin.demo
        tenantKey:
          type: string
          example: demo
        issuer:
          type: string
          example: http://localhost:8081/realms/devjur-demo
        roles:
          type: array
          items:
            type: string
          example: [DEVJUR_ADMIN]
    CreateProbeRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 200
          example: Tenant database write check
    ProbeResponse:
      type: object
      required: [id, tenantKey, message, createdAt]
      properties:
        id:
          type: string
          format: uuid
        tenantKey:
          type: string
          example: demo
        message:
          type: string
          example: Tenant database write check
        createdAt:
          type: string
          format: date-time
    FeatureFlagEvaluationResponse:
      type: object
      required: [flagKey, enabled, variant, reason]
      properties:
        flagKey:
          type: string
          example: platform.storage.enabled
        enabled:
          type: boolean
          example: true
        variant:
          type:
            - string
            - "null"
          example: beta
        reason:
          type: string
          example: TARGETING_MATCH
    FileUploadResponse:
      type: object
      required: [fileId, tenantKey, originalFilename, contentType, size, checksumSha256, createdAt]
      properties:
        fileId:
          type: string
          format: uuid
        tenantKey:
          type: string
          example: demo
        originalFilename:
          type: string
          example: contrato.pdf
        contentType:
          type: string
          example: application/pdf
        size:
          type: integer
          format: int64
          minimum: 0
          example: 24576
        checksumSha256:
          type: string
          pattern: ^[a-f0-9]{64}$
        createdAt:
          type: string
          format: date-time
    FileMetadataResponse:
      type: object
      required: [fileId, tenantKey, originalFilename, contentType, size, checksumSha256, createdAt, createdBy]
      properties:
        fileId:
          type: string
          format: uuid
        tenantKey:
          type: string
          example: demo
        originalFilename:
          type: string
          example: contrato.pdf
        contentType:
          type: string
          example: application/pdf
        size:
          type: integer
          format: int64
          minimum: 0
          example: 24576
        checksumSha256:
          type: string
          pattern: ^[a-f0-9]{64}$
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          example: admin.demo
    AuditEntryResponse:
      type: object
      required: [auditId, tenantKey, action, resourceType, resourceId, actor, correlationId, occurredAt, metadata]
      properties:
        auditId:
          type: string
          format: uuid
        tenantKey:
          type: string
          example: demo
        action:
          type: string
          example: FILE_UPLOADED
        resourceType:
          type: string
          example: platform_file
        resourceId:
          type:
            - string
            - "null"
          example: 9dc62667-7df6-48e4-a877-a1784e81c57f
        actor:
          type:
            - string
            - "null"
          example: admin.demo
        correlationId:
          type: string
          example: 2a3d625a-d8c1-4f10-9228-80292b39d183
        occurredAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    AuditEntryPageResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntryResponse"
    MailTestRequest:
      type: object
      required: [to, subject, body]
      properties:
        to:
          type: string
          format: email
          example: admin.demo@devjur.local
        subject:
          type: string
          minLength: 1
          maxLength: 160
          example: DEVJUR Mailpit smoke
        body:
          type: string
          minLength: 1
          maxLength: 4000
          example: Teste de envio local
    MailTestResponse:
      type: object
      required: [to, subject, status]
      properties:
        to:
          type: string
          format: email
          example: admin.demo@devjur.local
        subject:
          type: string
          example: DEVJUR Mailpit smoke
        status:
          type: string
          enum: [ACCEPTED]
