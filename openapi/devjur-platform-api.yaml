openapi: 3.1.0
info:
  title: DEVJUR Platform API
  version: 0.1.0
  description: Foundation API for tenant context, authenticated user context and tenant database probe.
servers:
  - url: http://demo.api.localhost:8080
    description: Local demo tenant API
security:
  - bearerAuth: []
paths:
  /api/contracts:
    get:
      operationId: listContracts
      summary: Lists tenant contracts using the authenticated tenant context.
      tags: [Contracts]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ContractStatus"
        - name: query
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 120
          description: Searches contract number, title and counterparty names.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Tenant contracts ordered by most recent update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createContract
      summary: Creates a tenant contract draft.
      tags: [Contracts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContractRequest"
      responses:
        "201":
          description: Contract draft created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractDetailResponse"
        "400":
          description: Contract request is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Contract number already exists for this tenant.
  /api/contracts/{contractId}:
    get:
      operationId: getContract
      summary: Returns a tenant contract detail.
      tags: [Contracts]
      parameters:
        - $ref: "#/components/parameters/ContractId"
      responses:
        "200":
          description: Contract detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Contract was not found in the current tenant.
    patch:
      operationId: updateContract
      summary: Updates editable contract draft metadata.
      tags: [Contracts]
      parameters:
        - $ref: "#/components/parameters/ContractId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContractRequest"
      responses:
        "200":
          description: Contract updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractDetailResponse"
        "400":
          description: Contract update is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Contract was not found in the current tenant.
        "409":
          description: Contract number already exists for this tenant.
  /api/contracts/{contractId}/attachments:
    get:
      operationId: listContractAttachments
      summary: Lists files attached to a tenant contract.
      tags: [Contracts]
      parameters:
        - $ref: "#/components/parameters/ContractId"
      responses:
        "200":
          description: Contract attachments ordered by creation time.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractAttachmentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Contract was not found in the current tenant.
    post:
      operationId: attachContractFile
      summary: Attaches an uploaded platform file to a tenant contract.
      tags: [Contracts]
      parameters:
        - $ref: "#/components/parameters/ContractId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractAttachmentRequest"
      responses:
        "201":
          description: File attached to contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractAttachmentResponse"
        "400":
          description: Attachment request is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Contract or uploaded file was not found in the current tenant.
  /api/platform/tenants:
    post:
      operationId: provisionTenant
      summary: Provisions a tenant realm, hosts and baseline administrative access.
      tags: [Platform Tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisionTenantRequest"
      responses:
        "201":
          description: Tenant provisioning request accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionTenantResponse"
        "400":
          description: Provisioning request is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Tenant key, host or realm already exists.
  /api/platform/tenants/{tenantKey}:
    get:
      operationId: getTenantProvisioning
      summary: Returns tenant provisioning status and resolved platform metadata.
      tags: [Platform Tenants]
      parameters:
        - name: tenantKey
          in: path
          required: true
          schema:
            type: string
            pattern: ^[a-z0-9-]{3,40}$
      responses:
        "200":
          description: Tenant provisioning status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionTenantResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Tenant provisioning record was not found.
  /api/platform/permissions/navigation:
    get:
      operationId: getNavigationPermissions
      summary: Returns navigation entries allowed for the authenticated user.
      tags: [Platform Permissions]
      responses:
        "200":
          description: Navigation permission projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NavigationPermissionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/platform/features/{flagKey}/evaluate:
    get:
      operationId: evaluateFeatureFlag
      summary: Evaluates a platform feature flag for the current tenant and user context.
      tags: [Platform Features]
      parameters:
        - name: flagKey
          in: path
          required: true
          schema:
            type: string
            minLength: 1
          example: platform.storage.enabled
      responses:
        "200":
          description: Feature flag evaluation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureFlagEvaluationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/platform/files:
    post:
      operationId: uploadPlatformFile
      summary: Uploads a tenant file through the API so metadata and audit can be recorded.
      tags: [Platform Files]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: File uploaded and metadata recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResponse"
        "400":
          description: Upload request is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          description: Storage service is disabled or unavailable.
  /api/platform/files/{fileId}:
    get:
      operationId: getPlatformFileMetadata
      summary: Returns tenant file metadata.
      tags: [Platform Files]
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: File metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileMetadataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: File metadata was not found.
  /api/platform/files/{fileId}/download:
    get:
      operationId: downloadPlatformFile
      summary: Downloads a tenant file through the API so access can be audited.
      tags: [Platform Files]
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: File bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: File was not found.
        "503":
          description: Storage service is disabled or unavailable.
  /api/platform/audit:
    get:
      operationId: searchAuditEntries
      summary: Searches tenant audit entries.
      tags: [Platform Audit]
      parameters:
        - name: action
          in: query
          required: false
          schema:
            type: string
          example: FILE_UPLOADED
        - name: resourceType
          in: query
          required: false
          schema:
            type: string
          example: platform_file
        - name: resourceId
          in: query
          required: false
          schema:
            type: string
          example: 9dc62667-7df6-48e4-a877-a1784e81c57f
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Audit entries ordered by occurrence time descending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEntryPageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/platform/mail/test:
    post:
      operationId: sendPlatformTestEmail
      summary: Sends a controlled test email through the platform mail service.
      tags: [Platform Mail]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MailTestRequest"
      responses:
        "202":
          description: Test email request accepted by the platform mail service.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailTestResponse"
        "400":
          description: Mail test request is invalid.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/foundation/tenant/current:
    get:
      operationId: getCurrentTenant
      summary: Returns the tenant resolved from the request host.
      tags: [Foundation]
      responses:
        "200":
          description: Current tenant context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentTenantResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/foundation/me:
    get:
      operationId: getCurrentUser
      summary: Returns the authenticated user context.
      tags: [Foundation]
      responses:
        "200":
          description: Current authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/foundation/probe:
    post:
      operationId: createFoundationProbe
      summary: Writes a probe record into the current tenant database.
      tags: [Foundation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProbeRequest"
      responses:
        "201":
          description: Probe created in the tenant database.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ContractId:
      name: contractId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FileId:
      name: fileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Authentication is missing or invalid.
    Forbidden:
      description: Tenant, issuer, realm or permission validation failed.
  schemas:
    CreateContractRequest:
      type: object
      required: [title, type, parties]
      properties:
        contractNumber:
          type:
            - string
            - "null"
          minLength: 1
          maxLength: 60
          example: CTR-2026-0001
        title:
          type: string
          minLength: 3
          maxLength: 180
          example: Prestacao de servicos juridicos
        type:
          $ref: "#/components/schemas/ContractType"
        summary:
          type:
            - string
            - "null"
          maxLength: 1000
          example: Contrato de prestacao de servicos recorrentes.
        parties:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: "#/components/schemas/ContractPartyRequest"
        amount:
          type:
            - number
            - "null"
          format: double
          minimum: 0
          example: 15000.0
        currency:
          type:
            - string
            - "null"
          pattern: ^[A-Z]{3}$
          default: BRL
          example: BRL
        effectiveDate:
          type:
            - string
            - "null"
          format: date
          example: 2026-07-01
        expirationDate:
          type:
            - string
            - "null"
          format: date
          example: 2027-06-30
    UpdateContractRequest:
      type: object
      properties:
        contractNumber:
          type:
            - string
            - "null"
          minLength: 1
          maxLength: 60
          example: CTR-2026-0001
        title:
          type: string
          minLength: 3
          maxLength: 180
          example: Prestacao de servicos juridicos atualizada
        type:
          $ref: "#/components/schemas/ContractType"
        status:
          $ref: "#/components/schemas/ContractStatus"
        summary:
          type:
            - string
            - "null"
          maxLength: 1000
        parties:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: "#/components/schemas/ContractPartyRequest"
        amount:
          type:
            - number
            - "null"
          format: double
          minimum: 0
        currency:
          type:
            - string
            - "null"
          pattern: ^[A-Z]{3}$
        effectiveDate:
          type:
            - string
            - "null"
          format: date
        expirationDate:
          type:
            - string
            - "null"
          format: date
    ContractListResponse:
      type: object
      required: [entries, page, size]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ContractSummaryResponse"
        page:
          type: integer
          minimum: 0
          example: 0
        size:
          type: integer
          minimum: 1
          example: 20
        total:
          type:
            - integer
            - "null"
          minimum: 0
          description: Optional total count when the backend can compute it cheaply.
          example: 42
    ContractSummaryResponse:
      type: object
      required: [contractId, tenantKey, title, type, status, primaryCounterparty, attachmentCount, createdAt, updatedAt]
      properties:
        contractId:
          type: string
          format: uuid
        tenantKey:
          type: string
          example: demo
        contractNumber:
          type:
            - string
            - "null"
          example: CTR-2026-0001
        title:
          type: string
          example: Prestacao de servicos juridicos
        type:
          $ref: "#/components/schemas/ContractType"
        status:
          $ref: "#/components/schemas/ContractStatus"
        primaryCounterparty:
          type:
            - string
            - "null"
          example: ACME Juridico
        attachmentCount:
          type: integer
          minimum: 0
          example: 2
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ContractDetailResponse:
      type: object
      required: [contractId, tenantKey, title, type, status, parties, attachments, createdAt, updatedAt, createdBy]
      properties:
        contractId:
          type: string
          format: uuid
        tenantKey:
          type: string
          example: demo
        contractNumber:
          type:
            - string
            - "null"
          example: CTR-2026-0001
        title:
          type: string
          example: Prestacao de servicos juridicos
        type:
          $ref: "#/components/schemas/ContractType"
        status:
          $ref: "#/components/schemas/ContractStatus"
        summary:
          type:
            - string
            - "null"
          example: Contrato de prestacao de servicos recorrentes.
        parties:
          type: array
          items:
            $ref: "#/components/schemas/ContractPartyResponse"
        amount:
          type:
            - number
            - "null"
          format: double
          example: 15000.0
        currency:
          type:
            - string
            - "null"
          pattern: ^[A-Z]{3}$
          example: BRL
        effectiveDate:
          type:
            - string
            - "null"
          format: date
        expirationDate:
          type:
            - string
            - "null"
          format: date
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/ContractAttachmentResponse"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          type: string
          example: admin.demo
        updatedBy:
          type:
            - string
            - "null"
          example: admin.demo
    ContractPartyRequest:
      type: object
      required: [role, displayName]
      properties:
        role:
          type: string
          enum: [OWNER, COUNTERPARTY, GUARANTOR, WITNESS]
          example: COUNTERPARTY
        displayName:
          type: string
          minLength: 2
          maxLength: 180
          example: ACME Juridico
        document:
          type:
            - string
            - "null"
          maxLength: 40
          example: "12.345.678/0001-90"
        email:
          type:
            - string
            - "null"
          format: email
          example: juridico@acme.local
        primary:
          type: boolean
          default: false
    ContractPartyResponse:
      allOf:
        - $ref: "#/components/schemas/ContractPartyRequest"
        - type: object
          required: [partyId]
          properties:
            partyId:
              type: string
              format: uuid
    ContractAttachmentRequest:
      type: object
      required: [fileId, attachmentType]
      properties:
        fileId:
          type: string
          format: uuid
          description: Identifier returned by the platform file upload endpoint.
        attachmentType:
          type: string
          enum: [DRAFT, SIGNED, SUPPORTING_DOCUMENT, OTHER]
          example: DRAFT
        description:
          type:
            - string
            - "null"
          maxLength: 500
          example: Minuta inicial enviada pelo fornecedor.
    ContractAttachmentListResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ContractAttachmentResponse"
    ContractAttachmentResponse:
      type: object
      required: [attachmentId, contractId, file, attachmentType, createdAt, createdBy]
      properties:
        attachmentId:
          type: string
          format: uuid
        contractId:
          type: string
          format: uuid
        file:
          $ref: "#/components/schemas/FileMetadataResponse"
        attachmentType:
          type: string
          enum: [DRAFT, SIGNED, SUPPORTING_DOCUMENT, OTHER]
        description:
          type:
            - string
            - "null"
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          example: admin.demo
    ContractType:
      type: string
      enum: [SERVICE_AGREEMENT, PURCHASE_AGREEMENT, NDA, ADDENDUM, OTHER]
      example: SERVICE_AGREEMENT
    ContractStatus:
      type: string
      enum: [DRAFT, IN_REVIEW, APPROVED, REJECTED, EXECUTED, CANCELLED]
      example: DRAFT
    ProvisionTenantRequest:
      type: object
      required: [tenantKey, displayName, apiHost, webHost, realm]
      properties:
        tenantKey:
          type: string
          pattern: ^[a-z0-9-]{3,40}$
          example: acme
        displayName:
          type: string
          minLength: 3
          maxLength: 120
          example: ACME Juridico
        apiHost:
          type: string
          example: acme.api.localhost
        webHost:
          type: string
          example: acme.localhost
        realm:
          type: string
          pattern: ^[a-z0-9-]{3,80}$
          example: devjur-acme
        adminUsername:
          type: string
          default: admin.acme
          example: admin.acme
        adminEmail:
          type: string
          format: email
          example: admin.acme@devjur.local
    ProvisionTenantResponse:
      type: object
      required: [tenantKey, displayName, apiHost, webHost, realm, status, vaultPath, createdAt]
      properties:
        tenantKey:
          type: string
          pattern: ^[a-z0-9-]{3,40}$
          example: acme
        displayName:
          type: string
          example: ACME Juridico
        apiHost:
          type: string
          example: acme.api.localhost
        webHost:
          type: string
          example: acme.localhost
        realm:
          type: string
          pattern: ^[a-z0-9-]{3,80}$
          example: devjur-acme
        status:
          type: string
          enum: [PROVISIONING, ACTIVE, FAILED]
          example: ACTIVE
        vaultPath:
          type: string
          example: secret/data/devjur/tenants/acme/database
        createdAt:
          type: string
          format: date-time
    NavigationPermissionResponse:
      type: object
      required: [tenantKey, entries]
      properties:
        tenantKey:
          type: string
          example: demo
        entries:
          type: array
          items:
            $ref: "#/components/schemas/NavigationEntry"
    NavigationEntry:
      type: object
      required: [id, label, route, requiredRole]
      properties:
        id:
          type: string
          example: dashboard
        label:
          type: string
          example: Dashboard
        route:
          type: string
          example: /
        requiredRole:
          type: string
          example: DEVJUR_ADMIN
    CurrentTenantResponse:
      type: object
      required: [tenantKey, host, realm, issuer]
      properties:
        tenantKey:
          type: string
          example: demo
        host:
          type: string
          example: demo.api.localhost
        realm:
          type: string
          example: devjur-demo
        issuer:
          type: string
          example: http://localhost:8081/realms/devjur-demo
    CurrentUserResponse:
      type: object
      required: [subject, preferredUsername, tenantKey, issuer, roles]
      properties:
        subject:
          type: string
          example: 9dc62667-7df6-48e4-a877-a1784e81c57f
        preferredUsername:
          type: string
          example: admin.demo
        tenantKey:
          type: string
          example: demo
        issuer:
          type: string
          example: http://localhost:8081/realms/devjur-demo
        roles:
          type: array
          items:
            type: string
          example: [DEVJUR_ADMIN]
    CreateProbeRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 200
          example: Tenant database write check
    ProbeResponse:
      type: object
      required: [id, tenantKey, message, createdAt]
      properties:
        id:
          type: string
          format: uuid
        tenantKey:
          type: string
          example: demo
        message:
          type: string
          example: Tenant database write check
        createdAt:
          type: string
          format: date-time
    FeatureFlagEvaluationResponse:
      type: object
      required: [flagKey, enabled, variant, reason]
      properties:
        flagKey:
          type: string
          example: platform.storage.enabled
        enabled:
          type: boolean
          example: true
        variant:
          type:
            - string
            - "null"
          example: beta
        reason:
          type: string
          example: TARGETING_MATCH
    FileUploadResponse:
      type: object
      required: [fileId, tenantKey, originalFilename, contentType, size, checksumSha256, createdAt]
